[package]
name = "rs_quant"
version = "0.1.0"
edition = "2021"
authors = ["Matteo Montanari"]
description = "A library to get financial data from yahooFinanceAPI"

[lib]
name = "rs_quant"
path = "src/lib.rs"
test = true
crate-type = ["cdylib"]

[dependencies]
chrono = "0.4.38"
reqwest = { version = "0.12.9", features = ["json"] }
serde = { version = "1.0.215", features = ["derive"] }
serde_json = "1.0.133"
thiserror = "2.0.3"
tokio = { version = "1.41.1", features = ["full"] }
